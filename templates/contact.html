{% extends "base.html" %}
{% block title %}Contact — Blue Oak Express Bank{% endblock %}

{% block content %}
<div class="medium">

  <div class="page-head reveal">
    <h1>Contact us</h1>
    <p class="subtitle">Questions about your account, transfers, or a held transaction</p>
  </div>

  <div class="panel reveal" style="--d:80ms">
    <form method="POST" action="{{ url_for('contact') }}">
      <div class="field">
        <label for="name">Full name</label>
        <input class="input" type="text" id="name" name="name"
               autocomplete="name" required>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input class="input" type="email" id="email" name="email"
               placeholder="name@example.com" autocomplete="email" required>
      </div>

      <div class="field">
        <label for="message">Message</label>
        <textarea class="input" id="message" name="message" rows="5"
                  placeholder="How can we help?" required></textarea>
      </div>

      <button type="submit" class="btn btn-primary btn-block">Send message</button>
    </form>
  </div>

  <p class="hint" style="text-align:center; margin-top:16px">
    QUICK RESPONSE 24/7 SUPPORT.
  </p>
</div>
{% endblock %}
